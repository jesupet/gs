<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.jpg">
    <title>GS Valor que perdura</title>

    <!-- SEO -->
    <meta
      name="description"
      content="GS — Valor que perdura. Consultoría estratégica, reporting y trazabilidad, integridad y transparencia, gestión comunitaria, data & analytics, tecnología y desarrollo de software."
    >

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:site_name" content="GS">
    <meta property="og:type" content="website">
    <meta property="og:title" content="GS — Valor que perdura">
    <meta
      property="og:description"
      content="Consultoría estratégica, reporting y trazabilidad, integridad y transparencia, gestión comunitaria, data & analytics, tecnología y desarrollo de software."
    >
    <meta property="og:image" content="<%= BASE_URL %>favicon.jpg">
    <meta property="og:image:alt" content="GS">
    <meta property="og:locale" content="es_CL">
    <!-- Recomendado: reemplazar por tu dominio absoluto al publicar -->
    <meta property="og:url" content="<%= BASE_URL %>">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GS — Valor que perdura">
    <meta
      name="twitter:description"
      content="Consultoría estratégica, reporting y trazabilidad, integridad y transparencia, gestión comunitaria, data & analytics, tecnología y desarrollo de software."
    >
    <meta name="twitter:image" content="<%= BASE_URL %>favicon.jpg">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
